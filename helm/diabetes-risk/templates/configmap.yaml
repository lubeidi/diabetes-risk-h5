apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "diabetes-risk.fullname" . }}-config
  labels:
    {{- include "diabetes-risk.labels" . | nindent 4 }}
data:
  config.js: |
    (function (global) {
      "use strict";
      // apiBaseUrl = ac-adapter root, same as Android MoeAgiConfig.baseUrl
      var apiBaseUrl = {{ .Values.config.apiBaseUrl | quote }};
      global.DIABETES_API_BASE = apiBaseUrl.replace(/\/+$/, "") + "/moeagi";
      global.DIABETES_API_AUTH = {{ .Values.config.apiAuth | quote }};
      global.DIABETES_MODEL = {{ .Values.config.diabetesModel | quote }};
      global.DIABETES_EXPERT = {{ .Values.config.diabetesExpert | quote }};
      global.DIABETES_LANGUAGE = {{ .Values.config.language | default "zh" | quote }};
    })(typeof window !== "undefined" ? window : globalThis);
