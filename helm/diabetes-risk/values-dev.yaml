replicaCount: 1

image:
  repository: bj-warehouse.tencentcloudcr.com/weike/diabetes-risk
  pullPolicy: IfNotPresent
  tag: "2026-07-07-15-20"

config:
  apiBaseUrl: "https://ai-cloud-bk.4paradigm.com/ac-adapter"
  apiAuth: "Basic bGxtOlJtZjQjTGNHKGlGWnJqVTsySg=="
  diabetesExpert: "expert-phanthy-diabetes_predict"
  diabetesModel: "phanthy-lite"

ingress:
  enabled: true
  className: "haproxy"
  annotations:
    haproxy.org/path-rewrite: /dev/diabetes-risk/(.*) /\1
  hosts:
    - host: "ai-cloud-bk.4paradigm.com"
      paths:
        - path: /dev/diabetes-risk/
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

